<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Trivia - Preguntados Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="app-container">
        <!-- Start Screen -->
        <section id="start-screen" class="screen active">
            <div class="card glass">
                <div class="icon-header">⚽</div>
                <h1>Futbol Trivia</h1>
                <p>¿Qué tanto sabes del deporte rey? Demuestra tus conocimientos en estas 5 preguntas.</p>
                <button id="start-btn" class="primary-btn">¡Comenzar Juego!</button>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen">
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <span id="question-counter">Pregunta 1 de 5</span>
            </div>
            
            <div class="card glass question-card">
                <h2 id="question-text">Pregunta de futbol aquí</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options will be injected by JS -->
                </div>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen">
            <div class="card glass result-card">
                <div id="result-icon">🏆</div>
                <h1 id="result-title">¡Felicidades Ganador!</h1>
                <p id="result-text">Has acertado todas las preguntas.</p>
                <div class="score-display">
                    <span id="final-score">5</span>/5
                </div>
                <button id="restart-btn" class="secondary-btn">Jugar de nuevo</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
